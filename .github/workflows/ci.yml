name: CI

on:
  push:
  pull_request:

jobs:
  api-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install deps
        working-directory: services/api
        run: uv sync --all-extras --dev
      - name: Run tests
        working-directory: services/api
        run: uv run pytest -q
