services:
  api:
    build:
      context: ../services/api
      target: base
    container_name: coachella_api
    environment:
      APP_ENV: local
      APP_VERSION: 0.1.0
      API_PREFIX: /v1
      SQLITE_PATH: /tmp/coachella.db
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
      - minio

  api_tests:
    build:
      context: ../services/api
      target: test
    container_name: coachella_api_tests
    environment:
      APP_ENV: local
      APP_VERSION: 0.1.0
      API_PREFIX: /v1
      SQLITE_PATH: /tmp/coachella-tests.db
    depends_on:
      - postgres
      - redis
      - minio
    command: pytest -q

  parser_worker:
    build:
      context: ../services/parser-worker
    container_name: coachella_parser_worker
    depends_on:
      - redis

  postgres:
    image: postgres:16
    container_name: coachella_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: coachella_redis
    ports:
      - '${REDIS_PORT}:6379'

  minio:
    image: minio/minio:latest
    container_name: coachella_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '${MINIO_API_PORT}:9000'
      - '${MINIO_CONSOLE_PORT}:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
