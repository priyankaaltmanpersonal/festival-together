services:
  api:
    build:
      context: ../services/api
    container_name: coachella_api
    environment:
      APP_ENV: local
      APP_VERSION: 0.1.0
      API_PREFIX: /v1
      SQLITE_PATH: /tmp/coachella.db
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
      - minio

  parser_worker:
    build:
      context: ../services/parser-worker
    container_name: coachella_parser_worker
    depends_on:
      - redis

  postgres:
    image: postgres:16
    container_name: coachella_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: coachella
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: coachella_redis
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: coachella_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
